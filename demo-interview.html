<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能面试系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════ */
/*  DESIGN SYSTEM — inspired by Stripe, Vercel, Linear               */
/* ═══════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Color */
  --bg:#FAFAFA;--surface:#FFFFFF;--surface-hover:#F5F5F7;--surface-active:#EEEEF2;
  --text:#18181B;--text-secondary:#71717A;--text-tertiary:#A1A1AA;--text-disabled:#D4D4D8;
  --accent:#5B5BED;--accent-hover:#4F4FE0;--accent-soft:rgba(91,91,237,0.06);
  --accent-medium:rgba(91,91,237,0.12);--accent-glow:rgba(91,91,237,0.22);
  --success:#10B981;--success-soft:rgba(16,185,129,0.08);--success-glow:rgba(16,185,129,0.18);
  --warning:#F59E0B;--warning-soft:rgba(245,158,11,0.08);
  --danger:#EF4444;--danger-soft:rgba(239,68,68,0.06);
  --border:#E8E8ED;--border-light:#F0F0F3;--border-hover:#D4D4D8;
  /* Shadow */
  --shadow-xs:0 0 0 1px rgba(0,0,0,0.03);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.02);
  --shadow-md:0 4px 6px rgba(0,0,0,0.03),0 2px 4px rgba(0,0,0,0.02);
  --shadow-lg:0 10px 25px rgba(0,0,0,0.04),0 4px 10px rgba(0,0,0,0.02);
  --shadow-xl:0 20px 50px rgba(0,0,0,0.06),0 8px 20px rgba(0,0,0,0.03);
  --shadow-accent:0 4px 16px rgba(91,91,237,0.2);
  /* Radius */
  --r-xs:6px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-full:9999px;
  /* Easing */
  --ease-1:cubic-bezier(0.16,1,0.3,1);
  --ease-2:cubic-bezier(0.34,1.56,0.64,1);
  --ease-3:cubic-bezier(0.4,0,0.2,1);
  --ease-4:cubic-bezier(0.65,0,0.35,1);
  /* Font */
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
}

html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.6;letter-spacing:-0.011em;min-height:100vh;overflow-x:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-disabled);border-radius:var(--r-full)}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* Selection */
::selection{background:rgba(91,91,237,0.15);color:var(--text)}

/* ═══════════════════════════════════════════════════════════════════ */
/*  VIEW TRANSITIONS                                                  */
/* ═══════════════════════════════════════════════════════════════════ */
.view{display:none;will-change:opacity,transform}
.view.active{display:flex;animation:viewIn .5s var(--ease-1)}
@keyframes viewIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════════════════════════ */
/*  BUTTON                                                            */
/* ═══════════════════════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:44px;padding:0 20px;border-radius:var(--r-sm);font-size:14.5px;
  font-weight:500;font-family:var(--font);border:none;cursor:pointer;
  transition:all .2s var(--ease-1);outline:none;position:relative;
  letter-spacing:-0.01em;white-space:nowrap;text-decoration:none;
  -webkit-user-select:none;user-select:none
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#FFF;box-shadow:var(--shadow-accent)}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 6px 20px rgba(91,91,237,0.28);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow-xs)}
.btn-secondary:hover{background:var(--surface-hover);border-color:var(--border-hover);box-shadow:var(--shadow-sm)}
.btn-ghost{background:transparent;color:var(--text-secondary);height:32px;padding:0 10px;border-radius:var(--r-xs)}
.btn-ghost:hover{background:var(--surface-hover);color:var(--text)}
.btn-danger{background:transparent;color:var(--text-secondary);height:32px;padding:0 10px;border-radius:var(--r-xs)}
.btn-danger:hover{background:var(--danger-soft);color:var(--danger)}
.btn-lg{height:52px;padding:0 28px;font-size:16px;border-radius:var(--r-md)}
.btn-full{width:100%}
.btn:disabled{opacity:.35;pointer-events:none;transform:none!important;box-shadow:none!important}

/* ═══════════════════════════════════════════════════════════════════ */
/*  FOCUS RING                                                        */
/* ═══════════════════════════════════════════════════════════════════ */
.focus-ring:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-xs)}

/* ═══════════════════════════════════════════════════════════════════ */
/*  SETUP                                                             */
/* ═══════════════════════════════════════════════════════════════════ */
#setup{align-items:center;justify-content:center;padding:48px 24px;min-height:100vh;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(91,91,237,0.03) 0%,transparent 60%),var(--bg)}
.setup-wrap{width:100%;max-width:680px}

/* Brand */
.brand{text-align:center;margin-bottom:36px}
.brand-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:14px;margin-bottom:20px;
  background:linear-gradient(135deg,#5B5BED 0%,#A78BFA 100%);
  box-shadow:0 8px 24px rgba(91,91,237,0.3)
}
.brand-mark svg{width:22px;height:22px}
.brand h1{
  font-size:30px;font-weight:700;letter-spacing:-0.025em;margin-bottom:6px;
  background:linear-gradient(135deg,#18181B 0%,#3F3F46 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.brand p{font-size:15px;color:var(--text-secondary);line-height:1.6;max-width:440px;margin:0 auto}

/* Form card */
.card{
  background:var(--surface);border-radius:var(--r-xl);
  border:1px solid var(--border-light);box-shadow:var(--shadow-lg);padding:40px
}
.card-group{margin-bottom:25px}
.card-group:last-of-type{margin-bottom:0}
.card-label{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px
}
.card-label span{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.03em;text-transform:uppercase}
.card-label .hint{font-size:12px;color:var(--text-tertiary);font-weight:400;text-transform:none;letter-spacing:0}
.card-textarea{
  width:100%;min-height:130px;max-height:280px;resize:vertical;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--surface-hover);padding:13px 16px;
  font-size:14.5px;line-height:1.65;font-family:var(--font);color:var(--text);
  outline:none;transition:all .2s var(--ease-1);letter-spacing:-0.005em
}
.card-textarea::placeholder{color:var(--text-disabled)}
.card-textarea:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 4px var(--accent-soft)}

/* Tips row */
.tips-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:28px 0 32px}
.tip{
  display:flex;align-items:flex-start;gap:10px;padding:14px 16px;
  background:var(--surface-hover);border-radius:var(--r-sm);
  border:1px solid transparent;transition:all .2s var(--ease-1)
}
.tip:hover{border-color:var(--border);background:var(--surface)}
.tip-dot{width:8px;height:8px;border-radius:var(--r-full);flex-shrink:0;margin-top:6px}
.tip-dot.a{background:var(--accent)}.tip-dot.b{background:var(--success)}
.tip-text{font-size:13px;color:var(--text-secondary);line-height:1.5}

/* ═══════════════════════════════════════════════════════════════════ */
/*  INTERVIEW                                                         */
/* ═══════════════════════════════════════════════════════════════════ */
#interview{flex-direction:column;height:100dvh;background:var(--surface)}
.int-header{
  display:flex;align-items:center;justify-content:space-between;
  height:56px;padding:0 24px;background:rgba(255,255,255,0.85);
  backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--border-light);flex-shrink:0;z-index:10
}
.int-header-l{display:flex;align-items:center;gap:13px}
.int-live{
  position:relative;width:9px;height:9px
}
.int-live::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--success);
  animation:liveRing 2s var(--ease-3) infinite
}
.int-live::after{
  content:'';position:absolute;inset:0;border-radius:50%;background:var(--success)
}
@keyframes liveRing{
  0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(2.2);opacity:0}
}
.int-prog{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
.int-topic{
  font-size:11px;font-weight:500;padding:3px 10px;border-radius:var(--r-full);
  background:var(--accent-soft);color:var(--accent);letter-spacing:.01em
}

/* Chat */
.chat-scroll{flex:1;overflow-y:auto;padding:36px 24px;
  background:radial-gradient(ellipse 50% 50% at 50% 0%,rgba(91,91,237,0.01) 0%,transparent 70%),var(--surface);
  scroll-behavior:smooth}
.chat-feed{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:28px}

/* Messages */
.msg{display:flex;gap:11px;max-width:72%;will-change:transform,opacity}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.in{animation:msgIn .5s var(--ease-2) both}
@keyframes msgIn{
  0%{opacity:0;transform:translateY(20px) scale(.92)}
  60%{transform:translateY(-2px) scale(1.01)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

.msg-avatar{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
  transition:transform .2s var(--ease-1)
}
.msg.ai .msg-avatar{background:var(--surface-hover);border:1px solid var(--border-light);box-shadow:var(--shadow-xs)}
.msg.user .msg-avatar{
  background:linear-gradient(135deg,#5B5BED,#A78BFA);
  box-shadow:0 4px 12px var(--accent-glow)
}

.msg-body{min-width:0;display:flex;flex-direction:column}
.msg-bubble{
  padding:13px 17px;font-size:14.5px;line-height:1.62;
  letter-spacing:-0.005em;position:relative;word-break:break-word
}
.msg.ai .msg-bubble{background:var(--surface-hover);color:#1F2937;border-radius:3px var(--r-lg) var(--r-lg) var(--r-lg)}
.msg.user .msg-bubble{background:var(--accent);color:#FFF;border-radius:var(--r-lg) 3px var(--r-lg) var(--r-lg)}
.msg-meta{display:flex;align-items:center;gap:6px;margin-top:4px;padding:0 5px}
.msg.user .msg-meta{justify-content:flex-end}
.msg-time{font-size:10.5px;color:var(--text-disabled);font-weight:400}

/* System msg */
.msg.sys{align-self:center;max-width:100%}
.msg.sys .msg-bubble{
  background:var(--accent-soft);color:var(--accent);border-radius:var(--r-full);
  text-align:center;padding:9px 22px;font-size:13px;font-weight:500
}

/* Typewriter */
.type-cursor{
  display:inline-block;width:1.5px;height:16px;background:var(--text-secondary);
  margin-left:1px;vertical-align:text-bottom;animation:cursorBlink .75s step-end infinite
}
@keyframes cursorBlink{50%{opacity:0}}

/* Thinking */
.thinking{display:flex;gap:5px;padding:5px 0}
.thinking span{
  width:7px;height:7px;border-radius:50%;background:var(--text-disabled);
  animation:think 1.2s var(--ease-4) infinite
}
.thinking span:nth-child(2){animation-delay:.18s}.thinking span:nth-child(3){animation-delay:.36s}
@keyframes think{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-9px);opacity:1}}

/* Input */
.int-input-wrap{padding:16px 24px 20px;background:var(--surface);border-top:1px solid var(--border-light);flex-shrink:0}
.int-input-box{
  max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
  background:var(--surface-hover);border:1.5px solid var(--border);
  border-radius:var(--r-md);padding:8px 8px 8px 18px;
  transition:all .25s var(--ease-1)
}
.int-input-box:focus-within{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 5px var(--accent-soft)}
.int-input-box textarea{
  flex:1;border:none;background:transparent;font-size:15px;font-family:var(--font);
  line-height:1.5;resize:none;outline:none;max-height:76px;padding:5px 0;
  color:var(--text);letter-spacing:-0.005em
}
.int-input-box textarea::placeholder{color:var(--text-tertiary)}
.int-input-box textarea:disabled{opacity:.35}
.send-btn{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease-1);color:#FFF
}
.send-btn.on{background:var(--accent);box-shadow:0 2px 10px var(--accent-glow)}
.send-btn.on:hover{background:var(--accent-hover);transform:scale(1.07);box-shadow:0 4px 16px var(--accent-glow)}
.send-btn.on:active{transform:scale(.94)}
.send-btn.off{background:var(--surface-active);color:var(--text-disabled);cursor:not-allowed;box-shadow:none}

.kbd-hint{text-align:center;font-size:11px;color:var(--text-disabled);margin-top:10px}
.kbd-hint kbd{
  display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
  padding:0 5px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface);font-family:var(--font);font-size:10.5px;color:var(--text-secondary);
  box-shadow:0 1px 0 var(--border)
}

/* Finished state */
.finished-state{border-top:1px solid var(--border-light);padding:40px 24px;text-align:center;background:var(--surface)}
.finished-state .fin-icon{font-size:40px;margin-bottom:12px}
.finished-state h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.finished-state p{font-size:13px;color:var(--text-secondary)}

/* ═══════════════════════════════════════════════════════════════════ */
/*  REPORT                                                            */
/* ═══════════════════════════════════════════════════════════════════ */
#report{align-items:flex-start;justify-content:center;padding:48px 24px;min-height:100vh;
  background:radial-gradient(ellipse 50% 30% at 50% 0%,rgba(91,91,237,0.02) 0%,transparent 60%),var(--bg)}
.rpt-wrap{width:100%;max-width:780px}
.rpt-header{text-align:center;margin-bottom:36px}
.rpt-header h1{
  font-size:28px;font-weight:700;letter-spacing:-0.025em;margin-bottom:4px;
  background:linear-gradient(135deg,#18181B,#3F3F46);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.rpt-meta{font-size:14px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;gap:10px}
.rpt-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--border)}

/* Score hero */
.score-hero{
  display:flex;align-items:center;gap:44px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;
  background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-xl);
  padding:36px 40px;box-shadow:var(--shadow-md)
}
.ring-wrap{position:relative;width:168px;height:168px;flex-shrink:0}
.ring-wrap svg{display:block;transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-score{font-size:46px;font-weight:700;letter-spacing:-0.03em;line-height:1;color:var(--text)}
.ring-unit{font-size:13px;color:var(--text-tertiary);margin-top:3px}
.score-info{flex:1;min-width:220px}
.score-badge{
  display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:var(--r-full);
  font-size:13px;font-weight:600;margin-bottom:16px
}
.score-badge.great{background:var(--success-soft);color:var(--success)}
.score-badge.good{background:var(--accent-soft);color:var(--accent)}
.score-badge.ok{background:var(--warning-soft);color:var(--warning)}
.score-info .summary{font-size:15px;color:var(--text-secondary);line-height:1.7}

/* Radar */
.radar-block{text-align:center;margin-bottom:24px}
.radar-block .inner-card{
  background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-xl);
  padding:32px 36px;box-shadow:var(--shadow-sm)
}
.radar-block h3{font-size:17px;font-weight:600;margin-bottom:24px;letter-spacing:-0.01em}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.detail-card{
  background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-lg);
  padding:24px;box-shadow:var(--shadow-sm);transition:all .25s var(--ease-1)
}
.detail-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--border)}
.dc-icon-w{
  width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;
  justify-content:center;margin-bottom:16px
}
.detail-card h4{font-size:14px;font-weight:600;margin-bottom:10px;letter-spacing:-0.01em}
.detail-card ul{list-style:none;font-size:13px;color:var(--text-secondary);line-height:1.8}
.detail-card ul li{display:flex;gap:7px}
.detail-card ul li::before{content:'—';color:var(--text-disabled);flex-shrink:0}

.dc-green .dc-icon-w{background:var(--success-soft)}.dc-green h4{color:var(--success)}
.dc-amber .dc-icon-w{background:var(--warning-soft)}.dc-amber h4{color:var(--warning)}
.dc-purple .dc-icon-w{background:var(--accent-soft)}.dc-purple h4{color:var(--accent)}

/* Actions */
.rpt-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ═══════════════════════════════════════════════════════════════════ */
/*  RESPONSIVE                                                        */
/* ═══════════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  .card{padding:28px}
  .tips-row{grid-template-columns:1fr}
  .msg{max-width:82%}
  .score-hero{flex-direction:column;gap:28px;padding:28px}
  .ring-wrap{width:140px;height:140px}
  .ring-score{font-size:38px}
  .detail-grid{grid-template-columns:1fr}
  .radar-block .inner-card{padding:24px 20px}
}
@media(max-width:480px){
  #setup{padding:24px 16px}
  .brand h1{font-size:24px}
  .chat-scroll{padding:24px 16px}
  .msg{max-width:88%}
  .int-header{padding:0 16px}
}
@media print{
  body{background:#FFF}
  #report{background:#FFF;padding:0}
  .rpt-btns{display:none}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════════ -->
<!--  SETUP                                                             -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<div id="setup" class="view active">
  <div class="setup-wrap">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <h1>AI 技术面试</h1>
      <p>输入岗位 JD 和候选人简历，智能生成定制化技术面试，实时评估并出具多维能力报告。</p>
    </div>

    <div class="tips-row">
      <div class="tip"><div class="tip-dot a"></div><p class="tip-text">详细描述岗位的核心技术栈和职责要求，AI 将据此生成针对性考题</p></div>
      <div class="tip"><div class="tip-dot b"></div><p class="tip-text">简历信息越详细，AI 越能深挖候选人的真实技术水平和项目经验</p></div>
    </div>

    <div class="card">
      <div class="card-group">
        <div class="card-label"><span>岗位描述 (JD)</span><span class="hint" id="jd-count">0 字</span></div>
        <textarea id="jd" class="card-textarea" placeholder="技术栈：Java 17, Spring Boot 3.x, Spring Cloud, MySQL 8.0, Redis Cluster, RabbitMQ, Docker, K8s&#10;&#10;岗位职责：&#10;1. 负责核心交易系统的微服务架构设计与开发&#10;2. 主导高并发场景性能优化，目标 QPS 5,000+&#10;3. 编写技术设计文档，指导初中级工程师&#10;&#10;任职要求：&#10;· 5 年以上后端开发经验，有大规模分布式系统实战&#10;· 精通 JVM 调优、SQL 优化、缓存策略&#10;· 良好的系统设计能力和技术方案输出能力" oninput="App.charCount('jd')"></textarea>
      </div>

      <div class="card-group">
        <div class="card-label"><span>候选人简历</span><span class="hint" id="resume-count">0 字</span></div>
        <textarea id="resume" class="card-textarea" placeholder="张三 | 高级 Java 工程师 | 8 年经验&#10;&#10;教育背景：2014 — 2018 浙江大学 计算机科学与技术&#10;&#10;工作经历：&#10;2022 — 至今 某互联网大厂 资深后端工程师&#10;· 主导支付系统架构升级，QPS 从 800 提升至 4,500&#10;· 设计分布式事务方案（Seata + MQ 最终一致性），事务成功率 99.97%&#10;· 优化 JVM GC 策略，Full GC 频率从 2 次 / 天降至 1 次 / 周&#10;&#10;技术特长：Java / Spring Boot / 分布式 / 性能调优 / MySQL / Redis" oninput="App.charCount('resume')"></textarea>
      </div>

      <button class="btn btn-primary btn-lg btn-full focus-ring" onclick="App.start()">
        开始面试
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════ -->
<!--  INTERVIEW                                                        -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<div id="interview" class="view">
  <div class="int-header">
    <div class="int-header-l">
      <div class="int-live"></div>
      <span class="int-prog" id="prog">准备开始</span>
      <span class="int-topic" id="topicBadge" style="display:none"></span>
    </div>
    <button class="btn-danger focus-ring" onclick="App.end()">结束面试</button>
  </div>

  <div class="chat-scroll" id="chatScroll">
    <div class="chat-feed" id="chatFeed"></div>
  </div>

  <div class="int-input-wrap" id="inputArea">
    <div class="int-input-box">
      <textarea id="userInput" placeholder="输入你的回答…" rows="1"
        onkeydown="App.key(event)" oninput="App.resize()"></textarea>
      <button class="send-btn off" id="sendBtn" disabled onclick="App.send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="kbd-hint">
      <kbd>Enter</kbd> 发送 &nbsp;<kbd>Shift</kbd> + <kbd>Enter</kbd> 换行
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════ -->
<!--  REPORT                                                           -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<div id="report" class="view">
  <div class="rpt-wrap" id="rptContent"></div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════ */
/*  HELPERS                                                           */
/* ═══════════════════════════════════════════════════════════════════ */
const $=s=>document.getElementById(s);
const V=v=>['setup','interview','report'].forEach(x=>$(x).classList.toggle('active',x===v));
const T=new Date();
const tm=()=>new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

/* ═══════════════════════════════════════════════════════════════════ */
/*  APP                                                               */
/* ═══════════════════════════════════════════════════════════════════ */
const App={
  /* State */
  jd:'',cv:'',q:[],qi:0,qTotal:5,name:'候选人',
  history:[],scores:[],locked:false,

  charCount(id){
    const el=$(id),c=$(id+'-count');
    c.textContent=el.value.length+' 字';
  },

  start(){
    const jd=$('jd').value.trim(),cv=$('resume').value.trim();
    if(!jd||!cv)return alert('请完整填写岗位 JD 和候选人简历');

    this.jd=jd;this.cv=cv;this.qi=0;this.qTotal=5;
    this.history=[];this.scores=[];this.locked=false;
    this.q=K.questions(jd,cv);
    this.name=(cv.match(/([一-龥]{2,3})(?:，|,|\s|的|是|·|\|)/)||[])[1]||'候选人';

    $('chatFeed').innerHTML='';
    $('userInput').value='';$('userInput').style.height='auto';
    $('userInput').disabled=true;
    this.updateSend();
    $('topicBadge').style.display='none';
    $('prog').textContent='准备开始';

    V('interview');

    setTimeout(()=>{
      Chat.ai(`你好，${this.name}！欢迎参加本次技术面试。我将围绕岗位要求进行 ${this.qTotal} 轮深度考察，请用具体的项目案例展现你的技术思考。准备好了吗？`);
      setTimeout(()=>this.ask(),2200);
    },400);
  },

  ask(){
    const item=this.q[this.qi];
    $('prog').textContent=`第 ${this.qi+1} / ${this.qTotal} 题`;
    $('topicBadge').style.display='inline-block';
    $('topicBadge').textContent=item.topic;
    Chat.ai(item.q);
    this.locked=false;
    $('userInput').disabled=false;
    $('userInput').focus();
    this.updateSend();
  },

  send(){
    if(this.locked)return;
    const inp=$('userInput'),text=inp.value.trim();
    if(!text)return;

    this.locked=true;inp.disabled=true;this.updateSend();

    const topic=this.q[this.qi].topic;
    Chat.user(text);
    this.history.push({role:'user',content:text,topic});

    inp.value='';inp.style.height='auto';

    // Score
    const sc=S.score(text,topic);
    this.scores.push(sc);

    // Think + respond
    const thinkEl=Chat.think();
    const follow=K.follow(text);

    setTimeout(()=>{
      Chat.remove(thinkEl);

      if(follow){
        Chat.ai(follow);
        $('prog').textContent=`第 ${this.qi+1} / ${this.qTotal} 题 · 追问中`;
        this.locked=false;inp.disabled=false;inp.focus();this.updateSend();
      }else{
        this.qi++;
        if(this.qi<this.qTotal){
          Chat.ai('好的，我们继续下一个话题。');
          setTimeout(()=>this.ask(),1200);
        }else{
          Chat.ai(`感谢你的参与！${this.qTotal} 轮技术考察已全部完成。正在为你生成评估报告…`);
          setTimeout(()=>this.finish(),1800);
        }
      }
    },850+Math.random()*1300);
  },

  finish(){
    this.locked=true;
    $('userInput').disabled=true;this.updateSend();
    $('prog').textContent='面试结束';
    V('report');
    R.build();
  },

  end(){
    if(this.locked||this.qi===0)return;
    if(!confirm('提前结束面试？将基于已回答题目生成评估报告。'))return;
    Chat.sys('面试已结束，正在生成评估报告…');
    $('userInput').disabled=true;this.updateSend();this.locked=true;
    setTimeout(()=>this.finish(),1600);
  },

  key(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this.send()}},

  resize(){
    const el=$('userInput');el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,76)+'px';
    this.updateSend();
  },

  updateSend(){
    const hasText=$('userInput').value.trim().length>0,locked=this.locked;
    $('sendBtn').disabled=!hasText||locked;
    $('sendBtn').className='send-btn '+(hasText&&!locked?'on':'off');
  }
};

/* ═══════════════════════════════════════════════════════════════════ */
/*  CHAT                                                              */
/* ═══════════════════════════════════════════════════════════════════ */
const Chat={
  ai(text,type=false){
    const el=this._msg('ai',type?'<span class="type-target"></span>':text,type);
    if(type)this._typewriter(el.querySelector('.msg-bubble'),text);
    return el;
  },
  user(text){return this._msg('user',text,false)},
  sys(text){return this._msg('sys',text,false)},
  think(){
    const el=document.createElement('div');el.className='msg ai in';
    el.innerHTML=`<div class="msg-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5"/><circle cx="8.5" cy="10" r="1.5" fill="#71717A"/><circle cx="15.5" cy="10" r="1.5" fill="#71717A"/><path d="M8 16c1.8 2.2 5 2.6 7.5 1.5"/></svg></div><div class="msg-body"><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div></div>`;
    $('chatFeed').appendChild(el);this.scroll();return el;
  },
  remove(el){if(el)el.remove()},

  _msg(role,html,animate){
    const isAI=role==='ai',isUser=role==='user';
    const av=isUser
      ?`<div class="msg-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>`
      :(role==='ai'?`<div class="msg-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#71717A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5"/><circle cx="8.5" cy="10" r="1.5" fill="#71717A"/><circle cx="15.5" cy="10" r="1.5" fill="#71717A"/><path d="M8 16c1.8 2.2 5 2.6 7.5 1.5"/></svg></div>`:'');
    const meta=role!=='sys'?`<div class="msg-meta"><span class="msg-time">${tm()}</span></div>`:'';

    const el=document.createElement('div');
    el.className=`msg ${role} ${animate?'':'in'}`;
    el.innerHTML=role==='sys'
      ?`<div class="msg-body"><div class="msg-bubble">${html}</div></div>`
      :`${av}<div class="msg-body"><div class="msg-bubble">${html}</div>${meta}</div>`;
    $('chatFeed').appendChild(el);
    if(!animate)requestAnimationFrame(()=>el.classList.add('in'));
    this.scroll();
    return el;
  },

  _typewriter(el,text){
    el.textContent='';let i=0;
    const cur=document.createElement('span');cur.className='type-cursor';el.appendChild(cur);
    const go=()=>{
      if(i>=text.length){cur.remove();return}
      el.insertBefore(document.createTextNode(text[i]),cur);i++;
      Chat.scroll();
      setTimeout(go,22+Math.random()*14);
    };
    go();
  },

  scroll(){
    requestAnimationFrame(()=>{
      const s=$('chatScroll');
      s.scrollTo({top:s.scrollHeight,behavior:'smooth'});
    });
  }
};

/* ═══════════════════════════════════════════════════════════════════ */
/*  KNOWLEDGE                                                         */
/* ═══════════════════════════════════════════════════════════════════ */
const K={
  extract(text){
    const bank=['Java','Spring Boot','Spring Cloud','MyBatis','MySQL','Redis','RabbitMQ','Kafka','Docker','Kubernetes','微服务','分布式','JVM','多线程','高并发','性能优化','Python','Django','FastAPI','React','Vue','Vue3','TypeScript','JavaScript','Node.js','Go','Golang','Rust','Elasticsearch','DDD','领域驱动','Seata','网关','分库分表'];
    const r=[];
    bank.forEach(k=>{if(text.includes(k)&&!r.includes(k))r.push(k)});
    return r.length?r.slice(0,6):['核心技术栈'];
  },

  questions(jd,cv){
    const jk=this.extract(jd),rk=this.extract(cv);
    const a=[...new Set([...jk,...rk])];
    const t1=a[0]||'核心技术',t2=a[1]||a[0]||'系统架构',t3=a[2]||'性能优化';
    return[
      {q:`请结合您在简历中提到的 ${t1} 项目经验，详细介绍您负责的核心模块架构设计。您承担了哪些关键技术决策？遇到过什么复杂的技术挑战？`,topic:'项目深挖'},
      {q:`在 ${t2} 方面，能否分享一个您从 0 到 1 主导的技术方案？重点说明您的技术选型依据、备选方案对比，以及最终的 trade-off 决策逻辑。`,topic:'架构能力'},
      {q:`假设加入团队后需要将现有系统的 ${t3} 指标提升 3—5 倍。请描述您的完整优化思路——从发现问题、制定方案到落地验证的全过程。`,topic:'性能优化'},
      {q:`描述一次您处理过的复杂线上故障。当时如何快速定位根因？采取了哪些止损和修复措施？事后输出了什么改进规范来防止复发？`,topic:'故障排查'},
      {q:`最后，如果让您从零搭建一个基于 ${t1} 的新项目，您会如何设计它的分层架构、技术选型、CI/CD 流水线和可观测性体系？`,topic:'综合素养'},
    ];
  },

  follow(text){
    const len=text.length;
    if(len<45)return '能否更详细地说明？最好结合一个具体的代码示例或架构决策来展开。';
    if(len<110)return '可以再深入一层——这个方案在极端场景下（如网络分区、大流量冲击）会有什么表现？如何应对？';
    if(/但是|然而|问题|困难|挑战|坑|失败|教训/.test(text))
      return '您提到了一些挑战，能否具体说说最终的解决方案是什么？从中学到了哪些可在新项目中复用的经验？';
    return null;
  }
};

/* ═══════════════════════════════════════════════════════════════════ */
/*  SCORING                                                           */
/* ═══════════════════════════════════════════════════════════════════ */
const S={
  score(text,topic){
    const len=Math.min(text.length,400);
    const base=68+Math.min(len/28,22)+Math.floor(Math.random()*8);
    const j=()=>Math.floor(Math.random()*7-3);
    return{
      techDepth:      Math.min(98,Math.max(55,Math.round(base+j()))),
      logicThinking:  Math.min(98,Math.max(55,Math.round(base+j()))),
      communication:  Math.min(98,Math.max(55,Math.round(base+j()-2))),
      engineering:    Math.min(98,Math.max(55,Math.round(base+j()+2))),
      learning:       Math.min(98,Math.max(55,Math.round(base+j()+1))),
    };
  },
  avg(list){
    if(!list.length)return{techDepth:75,logicThinking:74,communication:70,engineering:72,learning:76};
    const s={techDepth:0,logicThinking:0,communication:0,engineering:0,learning:0};
    list.forEach(x=>{for(const k in s)s[k]+=x[k]});
    const n=list.length;for(const k in s)s[k]=Math.round(s[k]/n);
    return s;
  }
};

/* ═══════════════════════════════════════════════════════════════════ */
/*  REPORT                                                            */
/* ═══════════════════════════════════════════════════════════════════ */
const R={
  build(){
    const avg=S.avg(App.scores);
    const dims=['techDepth','logicThinking','communication','engineering','learning'].map(k=>({
      key:k,
      label:({techDepth:'技术深度',logicThinking:'逻辑思维',communication:'沟通表达',engineering:'工程素养',learning:'学习能力'})[k],
      score:avg[k]
    }));
    const overall=Math.round(dims.reduce((s,d)=>s+d.score,0)/dims.length);

    let rating='良好',badgeClass='good';
    if(overall>=90){rating='卓越';badgeClass='great'}
    else if(overall>=80){rating='优秀';badgeClass='great'}
    else if(overall<70){rating='一般';badgeClass='ok'}

    const isStrong=rating==='卓越'||rating==='优秀';
    const summary=isStrong
      ?`候选人在本次技术面试中展现了出色的技术实力，在 ${dims.sort((a,b)=>b.score-a.score).slice(0,2).map(d=>d.label).join('、')} 方面尤为突出，整体表现${rating}，与目标岗位高度匹配。`
      :`候选人在本次面试中展现了${rating}的技术水平，${dims.sort((a,b)=>b.score-a.score).slice(0,1).map(d=>d.label+'方面表现最为亮眼')}，整体符合岗位基本要求，部分维度仍有提升空间。`;

    const hi=dims.filter(d=>d.score>=82).map(d=>`${d.label}表现突出（${d.score}分），展现了扎实的工程实践和深度思考能力`);
    const lo=dims.filter(d=>d.score<=70).map(d=>`${d.label}可持续加强（${d.score}分），建议通过更多大型项目实践来提升`);
    if(!hi.length)hi.push('整体技术能力均衡，具备良好的工程素养和系统设计思维');
    if(!lo.length)lo.push('各评估维度均在良好水平以上，暂无明显的短板');

    const tips=[
      '针对待提升维度制定专项学习计划，可结合开源项目贡献或内部技术分享来强化实践',
      '养成"先设计、再编码"的习惯，在方案评审环节多做 trade-off 对比分析',
      '持续关注行业前沿技术动态，保持对新事物的好奇心和批判性思维',
    ];

    $('rptContent').innerHTML=`
      <div class="rpt-header">
        <h1>面试评估报告</h1>
        <div class="rpt-meta"><span>${App.name}</span><span class="dot"></span><span>${new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'})}</span><span class="dot"></span><span>共 ${App.qTotal} 题</span></div>
      </div>
      <div class="score-hero">
        <div class="ring-wrap" id="ringWrap"></div>
        <div class="score-info">
          <div class="score-badge ${badgeClass}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            ${rating}
          </div>
          <p class="summary">${summary}</p>
          <p style="font-size:13px;color:var(--text-tertiary);margin-top:8px">本报告由 AI 智能面试系统自动生成，基于候选人回答的深度、逻辑性和专业度综合评估。</p>
        </div>
      </div>
      <div class="radar-block"><div class="inner-card"><h3>能力雷达图</h3><div id="radarWrap"></div></div></div>
      <div class="detail-grid">
        <div class="detail-card dc-green">
          <div class="dc-icon-w"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <h4>优势</h4><ul>${hi.map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
        <div class="detail-card dc-amber">
          <div class="dc-icon-w"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M21 12.5A9 9 0 003.5 17"/></svg></div>
          <h4>待改进</h4><ul>${lo.map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
        <div class="detail-card dc-purple">
          <div class="dc-icon-w"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <h4>提升建议</h4><ul>${tips.map(s=>`<li>${s}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="rpt-btns">
        <button class="btn btn-primary btn-lg focus-ring" onclick="window.print()" style="min-width:170px">下载报告</button>
        <button class="btn btn-secondary btn-lg focus-ring" onclick="R.reset()" style="min-width:170px">重新面试</button>
      </div>`;

    requestAnimationFrame(()=>{this.ring(overall);this.radar(dims)});
  },

  ring(score){
    const r=72,circ=2*Math.PI*r,target=circ-(circ*score)/100;
    $('ringWrap').innerHTML=`
      <svg width="168" height="168" viewBox="0 0 168 168">
        <defs><linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5B5BED"/><stop offset="100%" stop-color="#10B981"/></linearGradient></defs>
        <circle cx="84" cy="84" r="${r}" fill="none" stroke="#F0F0F3" stroke-width="10"/>
        <circle cx="84" cy="84" r="${r}" fill="none" stroke="url(#rGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="ringArc" style="transition:stroke-dashoffset 1.4s var(--ease-1)"/>
      </svg>
      <div class="ring-center"><div class="ring-score">${score}</div><div class="ring-unit">/ 100</div></div>`;
    requestAnimationFrame(()=>{const a=document.getElementById('ringArc');if(a)a.style.strokeDashoffset=String(target)});
  },

  radar(dims){
    const n=dims.length,size=300,cx=size/2,cy=size/2,r=118;
    const pt=(i,rad)=>{const a=2*Math.PI*i/n-Math.PI/2;return{x:cx+rad*Math.cos(a),y:cy+rad*Math.sin(a)}};

    let grid='';for(let l=1;l<=4;l++){const pts=Array.from({length:n},(_,i)=>pt(i,r*l/4));grid+=`<polygon points="${pts.map(p=>p.x+','+p.y).join(' ')}" fill="none" stroke="#F0F0F3" stroke-width="1.2"/>`}
    let axes='';for(let i=0;i<n;i++){const p=pt(i,r);axes+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#F0F0F3" stroke-width="1"/>`}

    const dp=dims.map((d,i)=>pt(i,r*d.score/100));
    const poly=dp.map(p=>p.x+','+p.y).join(' ');
    const dots=dp.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#FFF" stroke="#5B5BED" stroke-width="2.5"/>`).join('');

    let labels='',vals='';
    dims.forEach((d,i)=>{
      const p=pt(i,r+26);const s=pt(i,r+46);
      labels+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" fill="#71717A" font-size="11.5" font-weight="500" font-family="var(--font)">${d.label}</text>`;
      vals+=`<text x="${s.x}" y="${s.y}" text-anchor="middle" fill="#18181B" font-size="14" font-weight="700" font-family="var(--font)">${d.score}</text>`;
    });

    $('radarWrap').innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="max-width:100%;height:auto">${grid}${axes}<polygon points="${poly}" fill="rgba(91,91,237,0.1)" stroke="#5B5BED" stroke-width="2.2" stroke-linejoin="round"/>${dots}${labels}${vals}</svg>`;
  },

  reset(){
    App.jd='';App.cv='';App.qi=0;App.history=[];App.scores=[];App.locked=false;
    $('jd').value='';$('resume').value='';
    $('jd-count').textContent='0 字';$('resume-count').textContent='0 字';
    $('inputArea').style.display='';
    V('setup');
  }
};

/* Init */
document.addEventListener('DOMContentLoaded',()=>{
  const inp=$('userInput');
  inp.addEventListener('input',()=>{App.resize();App.updateSend()});
  $('jd').addEventListener('input',()=>App.charCount('jd'));
  $('resume').addEventListener('input',()=>App.charCount('resume'));
});
</script>
</body>
</html>
